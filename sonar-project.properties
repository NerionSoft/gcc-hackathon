sonar.sourceEncoding=UTF-8

sonar.sources=src
sonar.tests=tests

sonar.exclusions=**/node_modules/**,**/.next/**,**/dist/**,**/build/**,**/coverage/**,**/.turbo/**,**/generated/**,**/public/**,**/.idea/**

sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

sonar.coverage.exclusions=**/*.test.*,**/*.spec.*,**/*.config.*,**/*.d.ts,**/generated/**,**/mocks/**,**/fixtures/**,**/setup/**,**/e2e/**

sonar.javascript.lcov.reportPaths=coverage/lcov.info
